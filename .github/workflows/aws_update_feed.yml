name: Update AWS Feed Daily

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST (UTC+5:30)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run feed processor
        run: python aws_feed_processor.py

      - name: Commit and push updated Excel
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add aws_feed_master.xlsx

          git diff --cached --quiet && echo "No changes" || (
            git commit -m "Auto-update AWS feed $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
            git push origin HEAD:master
          )
